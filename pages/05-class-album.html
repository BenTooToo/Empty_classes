<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>班级相册</title>
  <link rel="stylesheet" href="../styles.css">
</head>
<body>
  <div class="page-shell">
    <header class="site-header">
      <div class="header-main">
        <div>
          <h1>折棠6中同窗录</h1>
        </div>
      </div>
      <div class="old-nav site-status-bar">当前为只读镜像</div>
    </header>

    <main class="article-layout">
      <article class="panel article-panel">
        <h2>班级相册</h2>
        <p class="stamp">[2020-06-19 18:04] 相册索引</p>
        <div class="album-wall">
          <figure class="album-entry">
            <div class="photo-frame">
              <img src="../sport.png" alt="秋季运动会合照">
            </div>
            <figcaption>2014 秋季运动会 : 体育委员差一点夺冠！</figcaption>
          </figure>
          <figure class="album-entry">
            <div class="photo-frame">
              <img src="../spring.png" alt="春游合照">
            </div>
            <figcaption>2015 春游合照，大毛也跟着一起拍照</figcaption>
          </figure>
          <figure class="album-entry">
            <div class="photo-frame">
              <img src="../dimpome.png" alt="毕业前的教室合照">
            </div>
            <figcaption>2016 毕业前的教室，我很想念各位</figcaption>
          </figure>
          <figure class="album-entry">
            <div class="photo-frame">
              <img src="../credit.png" alt="窗边街景">
            </div>
            <figcaption>熟悉的街景</figcaption>
          </figure>
          <figure class="album-entry">
            <div class="photo-frame">
              <img src="../art.png" alt="美术相关照片">
            </div>
            <figcaption>林若萱是我们的骄傲</figcaption>
          </figure>
          <figure class="album-entry">
            <div class="photo-frame">
              <img src="../computer.png" alt="机房照片">
            </div>
            <figcaption>大家最喜欢的地方</figcaption>
          </figure>
        </div>
      </article>
    </main>

    <footer class="site-footer">
      <p>折棠6中同窗录 · 非公开纪念站 · 页面编码 UTF-8</p>
      <p class="footer-meta">建议使用 1024×768 分辨率浏览。部分早期资料仍在整理。<span class="page-index-note">4/40</span></p>
    </footer>
  </div>
</body>
</html>
