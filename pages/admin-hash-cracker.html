<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>哈希加密器</title>
  <link rel="stylesheet" href="../styles.css">
</head>
<body class="role-admin-page theme-dark theme-monitor hash-cracker-page">
  <div class="role-admin-shell hash-cracker-shell">
    <header class="role-admin-header role-detail-header">
      <a class="role-admin-back" href="admin-monitor-dashboard.html">返回后台</a>
      <div>
        <p class="role-admin-kicker">ADMIN PROGRAM / HASH</p>
        <h1>哈希加密器</h1>
      </div>
    </header>

    <main class="hash-cracker-main">
      <section class="hash-unlock-panel" id="hashUnlockPanel" aria-labelledby="hashUnlockTitle">
        <h2 id="hashUnlockTitle">程序锁定</h2>
        <form class="pin-form" id="pinForm" autocomplete="off">
          <p class="hash-recovery-success" id="hashRecoverySuccess" role="status" hidden>
            <strong>已解锁成功</strong>
            <span>锁定程序已被关闭，请自由尝试密码</span>
          </p>
          <div class="pin-boxes" aria-label="四位数密码">
            <input class="pin-box" id="pinDigit1" type="text" inputmode="numeric" maxlength="1" aria-label="第 1 位密码">
            <input class="pin-box" id="pinDigit2" type="text" inputmode="numeric" maxlength="1" aria-label="第 2 位密码">
            <input class="pin-box" id="pinDigit3" type="text" inputmode="numeric" maxlength="1" aria-label="第 3 位密码">
            <input class="pin-box" id="pinDigit4" type="text" inputmode="numeric" maxlength="1" aria-label="第 4 位密码">
          </div>
          <button type="submit">解锁</button>
          <p class="pin-error" id="pinError" role="status" aria-live="polite" hidden>密码错误</p>
        </form>
      </section>

      <section class="hash-loading-panel" id="hashLoadingPanel" hidden aria-live="polite">
        <div class="hash-loading-core"></div>
        <p>正在载入加密核心...</p>
      </section>

      <section class="hash-lockout-panel" id="hashLockoutPanel" hidden aria-labelledby="hashLockoutTitle">
        <h2 id="hashLockoutTitle">安全警告</h2>
        <div class="hash-lockout-console">
          <p>请输入单词 <code>unlock</code> 来重新尝试输入密码</p>
          <label for="hashRecoveryInput">恢复指令</label>
          <input id="hashRecoveryInput" type="text" autocomplete="off" autocapitalize="off" spellcheck="false" aria-label="输入恢复指令">
        </div>
      </section>

      <section class="hash-tool-panel" id="hashToolPanel" hidden aria-labelledby="hashToolTitle">
        <h2 id="hashToolTitle">哈希生成器</h2>
        <form class="hash-date-form" id="hashDateForm" autocomplete="off">
          <div class="hash-date-row">
            <input id="hashDateInput" name="hashDateInput" type="text" placeholder="例如：19870618" aria-label="生成器输入" data-history-key="hash-date">
            <button type="submit">生成</button>
          </div>
        </form>
        <output class="hash-output" id="hashOutput" aria-live="polite"></output>
      </section>
    </main>
  </div>

  <div class="hash-jumpscare" id="hashJumpscare" hidden aria-hidden="true">
    <img class="hash-jumpscare-original" src="../pics/hash-bloodshot-eyes-jumpscare.webp" alt="一双布满血丝、直视屏幕的眼睛">
    <img class="safe-jumpscare-image" src="../pics/safe-jumpscare.svg" alt="这是一个跳杀">
  </div>

  <script src="../admin-hash-cracker.js"></script>
  <script src="../input-history.js"></script>
  <script src="../pagination.js"></script>
</body>
</html>
