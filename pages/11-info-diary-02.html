    <article class="diary-paper" aria-label="我的日记2">
      <p>媛媛失踪前一天来找过我。她说班长约了几个人去学校，说毕业前再做一次“只有自己人知道”的活动。</p>
      <p>她不太想去，但又怕扫大家的兴。她还说运动委员也会去，而美术委员准备了纸和图案，班长的两个朋友负责看门。</p>
      <p>我问她是不是恶作剧，她说不知道，只听见他们提到一个从论坛上看到的都市传说。<strong>从那天以后，她就失踪了</strong>。</p>
      <p>但，最可怕的是，没有人记得媛媛了，他们都说我们班根本没有这个人。但是媛媛是我唯一的朋友啊，就连媛媛的家长也在说我玩笑说的太过了。。。</p>
      <p>我不相信，我一定会把媛媛带回来的，我会从班长开始逼问的</p>
      
    </article>
  </main>
