<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>信息委员后台</title>
  <link rel="stylesheet" href="../styles.css">
</head>
<body class="role-admin-page theme-light theme-info">
  <div class="role-admin-shell">
    <header class="role-admin-header">
      <div>
        <p class="role-admin-kicker">ADMIN ACCOUNT / INFO</p>
        <h1>信息委员后台</h1>
      </div>
      <a class="role-admin-exit" href="../admin.html">退出登录</a>
    </header>

    <main class="role-admin-layout">
      <section class="role-profile-panel">
        <h2>账号概览</h2>
        <dl class="role-profile-list">
          <dt>账号</dt>
          <dd>信息委员</dd>
          <dt>真实姓名</dt>
          <dd>许知夏</dd>
          <dt>现状</dt>
          <dd class="safe-status">正常</dd>
          <dt>权限范围</dt>
          <dd>站点备份、留言恢复、相册编号</dd>
        </dl>
      </section>

      <section class="role-content-panel">
        <h2>相关文件</h2>
        <ul class="role-file-list">
          <li><a href="admin-file-view.html?role=info&amp;file=info-account">账号登录记录</a></li>
          <li><a href="admin-file-view.html?role=info&amp;file=info-diary-01">信息委员日记 1</a></li>
          <li><a href="admin-file-view.html?role=info&amp;file=info-diary-02">信息委员日记 2</a></li>
          <li><a href="admin-file-view.html?role=info&amp;file=info-diary-03">信息委员日记 3</a></li>
          <li><a href="admin-file-view.html?role=info&amp;file=soul-return-log">返魂记录</a></li>
        </ul>
      </section>
    </main>
  </div>
  <script src="../admin-dashboard.js"></script>
</body>
</html>
